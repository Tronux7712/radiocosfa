<!DOCTYPE html>
<html lang="es">
<head>
<link rel="shortcut icon" href="favicon.png" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Cosfa</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background:
        linear-gradient(rgba(7, 45, 33, 0.72), rgba(29, 102, 57, 0.78)),
        url("rcosfafondo.png") center top / cover no-repeat fixed;
    color: #fff;
}

header {
    background: #0b3d2e;
    padding: 20px;
    border-bottom: 5px solid #f4c542;
}

.brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: transform 0.3s ease, filter 0.3s ease;
}

.brand-logo {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid rgba(244, 197, 66, 0.9);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    background: #fff;
}

.brand-title {
    margin: 0;
}

.brand.is-playing {
    filter: drop-shadow(0 0 12px rgba(255, 220, 92, 0.55));
}

.brand.is-playing .brand-logo {
    box-shadow:
        0 0 0 4px rgba(255, 214, 72, 0.18),
        0 0 26px rgba(255, 214, 72, 0.72),
        0 8px 18px rgba(0, 0, 0, 0.25);
    animation: brandGlow 1.8s ease-in-out infinite;
}

.brand.is-playing .brand-title {
    text-shadow:
        0 0 12px rgba(255, 226, 115, 0.72),
        0 0 28px rgba(72, 196, 255, 0.35);
}

.login-box,
.player-box,
.chat-box {
    width: min(92%, 540px);
    margin: 28px auto;
    border-radius: 20px;
    box-sizing: border-box;
}

.login-box {
    background: rgba(11, 61, 46, 0.88);
    padding: 24px;
    text-align: center;
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
}

.login-title {
    margin: 0 0 8px;
    font-size: 1.3rem;
}

.login-help,
#userInfo,
#authMessage,
#runtimeNotice {
    margin: 8px 0 0;
}

#authMessage,
#runtimeNotice {
    min-height: 24px;
    font-size: 0.95rem;
}

.warning {
    color: #ffe082;
}

.success {
    color: #dcedc8;
}

.auth-form {
    display: grid;
    gap: 12px;
    margin-top: 18px;
}

.auth-form input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    box-sizing: border-box;
}

.auth-actions,
.session-actions,
.chat-input {
    display: flex;
    gap: 10px;
}

.auth-actions {
    flex-wrap: wrap;
}

.auth-actions button,
.session-actions button,
.btn {
    background: #f4c542;
    border: none;
    color: #0b3d2e;
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
}

.google-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #ffffff;
    color: #1f1f1f;
    border: 1px solid #dadce0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
}

.google-btn:hover {
    background: #f8f9fa;
}

.google-logo {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: conic-gradient(#4285f4 0 25%, #34a853 25% 50%, #fbbc05 50% 75%, #ea4335 75% 100%);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    line-height: 1;
    flex-shrink: 0;
}

.auth-actions button.secondary,
.session-actions button.secondary {
    background: #fff;
}

.session-actions {
    justify-content: center;
    margin-top: 14px;
}

.hidden {
    display: none;
}

.player-box,
.chat-box {
    background: rgba(210, 180, 140, 0.92);
    color: #0b3d2e;
    padding: 26px;
    text-align: center;
    backdrop-filter: blur(3px);
}

.player-box iframe {
    width: 100%;
    height: 250px;
    border: 0;
    border-radius: 16px;
    margin-top: 12px;
}

.onair {
    display: inline-block;
    background: red;
    padding: 5px 12px;
    border-radius: 20px;
    color: white;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.1); }
}

@keyframes brandGlow {
    0%, 100% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.06);
    }
}

#messages {
    height: 340px;
    overflow: auto;
    background: linear-gradient(180deg, #1d2330, #11151d);
    padding: 14px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: left;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

.message {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    word-break: break-word;
    max-width: 88%;
}

.me {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.other {
    align-self: flex-start;
}

.avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255, 255, 255, 0.12);
    background: #2a3142;
}

.message-card {
    min-width: 0;
    padding: 10px 12px;
    border-radius: 16px;
    color: #f5f7fb;
    background: #2b3244;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.18);
}

.me .message-card {
    background: linear-gradient(135deg, #5865f2, #4752c4);
}

.message-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 0.78rem;
    white-space: nowrap;
}

.me .message-top {
    justify-content: flex-end;
}

.message-author {
    font-weight: 700;
    color: #ffffff;
    overflow: hidden;
    text-overflow: ellipsis;
}

.message-time {
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.72rem;
}

.message-text {
    margin: 0;
    line-height: 1.45;
    white-space: pre-wrap;
}

.message-delete {
    border: none;
    border-radius: 8px;
    background: rgba(255, 95, 95, 0.18);
    color: #ffd7d7;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 4px 7px;
    cursor: pointer;
}

.message-delete:hover {
    background: rgba(255, 95, 95, 0.35);
}

.chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
}

.chat-title {
    margin: 0;
}

.chat-live {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(17, 21, 29, 0.14);
    color: #0b3d2e;
    font-size: 0.85rem;
    font-weight: 700;
}

.chat-live-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #2ecc71;
    box-shadow: 0 0 0 6px rgba(46, 204, 113, 0.18);
}

.chat-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin: 10px 0 0;
}

.chat-presence {
    color: #35543f;
    font-size: 0.9rem;
    font-weight: 600;
}

#newMessagesBadge {
    border: none;
    padding: 8px 12px;
    border-radius: 999px;
    background: #0b3d2e;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
}

.chat-input {
    margin-top: 10px;
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
}

.chat-note {
    margin-top: 10px;
    font-size: 0.95rem;
}

.chat-empty {
    text-align: center;
    color: rgba(255, 255, 255, 0.76);
    padding: 28px 16px;
    line-height: 1.5;
}

.site-footer {
    text-align: center;
    padding: 18px 12px 28px;
    color: rgba(255, 255, 255, 0.92);
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
}

@media (max-width: 600px) {
    .brand {
        gap: 10px;
    }

    .brand-logo {
        width: 48px;
        height: 48px;
    }

    .auth-actions,
    .session-actions,
    .chat-input {
        flex-direction: column;
    }

    .btn {
        border-radius: 14px;
    }
}
</style>
</head>

<body>

<header>
    <div class="brand">
        <img src="logo.png" alt="Logo de Radio Cosfa" class="brand-logo">
        <h1 class="brand-title">Radio Cosfa</h1>
    </div>
</header>

<div class="login-box">
    <h2 class="login-title">Inicia sesión en la radio</h2>
    <p class="login-help">Puedes entrar con Google o con correo.</p>
    <p id="runtimeNotice" class="warning"></p>

    <div class="auth-form">
        <input id="email" type="email" placeholder="Correo electrónico">
        <input id="password" type="password" placeholder="Contraseña">
        <div class="auth-actions">
            <button id="loginBtn" type="button">Entrar</button>
            <button id="registerBtn" type="button" class="secondary">Crear cuenta</button>
            <button id="googleBtn" type="button" class="google-btn">
                <span class="google-logo">G</span>
                <span>Iniciar con Google</span>
            </button>
        </div>
    </div>

    <p id="userInfo">No conectado</p>
    <p id="authMessage"></p>

    <div id="sessionActions" class="session-actions hidden">
        <button id="logoutBtn" type="button" class="secondary">Cerrar sesión</button>
    </div>
</div>

<div class="player-box">
    <div class="onair">🔴 EN VIVO</div>
    <iframe id="playerFrame" src="https://zeno.fm/player/rcosfa" title="Reproductor Radio Cosfa" allow="autoplay"></iframe>
</div>

<div class="chat-box">
    <div class="chat-header">
        <h3 class="chat-title">💬 Chat en Vivo</h3>
        <div class="chat-live">
            <span class="chat-live-dot"></span>
            <span>Conectado en tiempo real</span>
        </div>
    </div>
    <div id="messages"></div>

    <div class="chat-input">
        <input id="msg" placeholder="Escribe un mensaje..." disabled>
        <button id="sendBtn" class="btn" type="button" disabled>➤</button>
    </div>

    <div class="chat-toolbar">
        <p id="chatPresence" class="chat-presence">Esperando mensajes en vivo...</p>
        <button id="newMessagesBadge" type="button" class="hidden">Ver mensajes nuevos</button>
    </div>

    <p id="chatStatus" class="chat-note">Inicia sesión para participar en el chat.</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
    browserLocalPersistence,
    createUserWithEmailAndPassword,
    getAuth,
    GoogleAuthProvider,
    onAuthStateChanged,
    setPersistence,
    signInWithEmailAndPassword,
    signInWithPopup,
    signOut,
    updateProfile
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyCUxr-xaHLd4qY0JTeAqb_xdEFt11nKk08",
    authDomain: "radiocosfa.firebaseapp.com",
    projectId: "radiocosfa",
    storageBucket: "radiocosfa.firebasestorage.app",
    messagingSenderId: "317657414524",
    appId: "1:317657414524:web:f7cb258381a352d66742f9"
});

const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();
const admins = ["ximebe712@gmail.com"];
const adminSet = new Set(admins.map((email) => email.toLowerCase()));
const API_BASE = "/api";

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const googleBtn = document.getElementById("googleBtn");
const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userInfo = document.getElementById("userInfo");
const authMessage = document.getElementById("authMessage");
const runtimeNotice = document.getElementById("runtimeNotice");
const sessionActions = document.getElementById("sessionActions");
const messages = document.getElementById("messages");
const msgInput = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const chatStatus = document.getElementById("chatStatus");
const chatPresence = document.getElementById("chatPresence");
const newMessagesBadge = document.getElementById("newMessagesBadge");
const brand = document.querySelector(".brand");
const playerFrame = document.getElementById("playerFrame");

let glowTimer = null;
let renderedMessages = 0;
let didFirstRender = false;
let cachedMessages = [];
let didWebResetOnLoad = false;

if (window.location.protocol === "file:") {
    runtimeNotice.textContent = "Firebase Auth suele fallar";
}

setPersistence(auth, browserLocalPersistence).catch(() => {
    showMessage("No se pudo mantener la sesión guardada en este navegador.", true);
});

function showMessage(text, isError = false) {
    authMessage.textContent = text;
    authMessage.className = isError ? "warning" : "success";
}

function formatError(error) {
    const code = error?.code || "";
    const map = {
        "auth/invalid-credential": "Correo o contraseña incorrectos.",
        "auth/popup-closed-by-user": "Cerraste la ventana de Google antes de completar el acceso.",
        "auth/popup-blocked": "El navegador bloqueó la ventana emergente de Google.",
        "auth/email-already-in-use": "Ese correo ya está registrado.",
        "auth/weak-password": "La contraseña debe tener al menos 6 caracteres.",
        "auth/invalid-email": "Escribe un correo válido.",
        "auth/operation-not-allowed": "Ese proveedor no está habilitado en Firebase Authentication.",
        "auth/unauthorized-domain": "Este dominio no está autorizado en Firebase Authentication."
    };
    return map[code] || `No fue posible iniciar sesión en este momento (${code || "sin código"}).`;
}

function sanitizeText(value) {
    return String(value || "").trim();
}

function getDisplayName(userLike) {
    const email = sanitizeText(userLike?.email);
    const fallbackName = email ? email.split("@")[0] : "Usuario";
    return sanitizeText(userLike?.name || userLike?.displayName) || fallbackName;
}

function getCurrentUserEmail() {
    return (auth.currentUser?.email || "").toLowerCase();
}

function isCurrentUserAdmin() {
    return adminSet.has(getCurrentUserEmail());
}

function formatChatTime(timestamp) {
    if (!timestamp) {
        return "ahora";
    }

    return new Intl.DateTimeFormat("es-CO", {
        hour: "numeric",
        minute: "2-digit"
    }).format(new Date(timestamp));
}

function isNearBottom() {
    return messages.scrollHeight - messages.scrollTop - messages.clientHeight < 48;
}

function scrollChatToBottom() {
    messages.scrollTop = messages.scrollHeight;
    newMessagesBadge.classList.add("hidden");
}

function updatePresenceLabel() {
    if (renderedMessages === 0) {
        chatPresence.textContent = "Esperando mensajes en vivo...";
        return;
    }

    chatPresence.textContent = `${renderedMessages} mensaje${renderedMessages === 1 ? "" : "s"} cargado${renderedMessages === 1 ? "" : "s"} en la sala`;
}

function updateSessionUI(user) {
    const isLoggedIn = Boolean(user);
    const name = user?.displayName || user?.email || "Usuario";
    const badge = adminSet.has((user?.email || "").toLowerCase()) ? " 👑" : "";

    userInfo.textContent = isLoggedIn ? `Conectado: ${name}${badge}` : "No conectado";
    sessionActions.classList.toggle("hidden", !isLoggedIn);
    msgInput.disabled = !isLoggedIn;
    sendBtn.disabled = !isLoggedIn;
    chatStatus.textContent = isLoggedIn
        ? "Ya puedes escribir en el chat."
        : "Inicia sesión para participar en el chat.";
}

function setHeaderGlow(active) {
    brand.classList.toggle("is-playing", active);
}

function triggerHeaderGlow(duration = 15000) {
    setHeaderGlow(true);
    clearTimeout(glowTimer);
    glowTimer = setTimeout(() => {
        setHeaderGlow(false);
    }, duration);
}

function looksLikePlayEvent(payload) {
    if (!payload) {
        return false;
    }

    const serialized = typeof payload === "string"
        ? payload.toLowerCase()
        : JSON.stringify(payload).toLowerCase();

    return serialized.includes("play") || serialized.includes("playing") || serialized.includes("autoplay");
}

async function apiRequest(path, options = {}) {
    const response = await fetch(`${API_BASE}${path}`, {
        headers: {
            "Content-Type": "application/json",
            ...(options.headers || {})
        },
        ...options
    });

    const contentType = response.headers.get("content-type") || "";
    const payload = contentType.includes("application/json")
        ? await response.json()
        : {};

    if (!response.ok) {
        throw new Error(payload.error || "Error en servidor");
    }

    return payload;
}

function createMessageElement(data, messageId) {
    const currentEmail = getCurrentUserEmail();
    const messageEmail = (data.email || "").toLowerCase();
    const isMine = currentEmail && currentEmail === messageEmail;
    const wrapper = document.createElement("article");
    wrapper.className = `message ${isMine ? "me" : "other"}`;

    const avatar = document.createElement("img");
    avatar.className = "avatar";
    avatar.alt = "avatar";
    avatar.src = data.photo || "https://www.gravatar.com/avatar/?d=mp";

    const card = document.createElement("div");
    card.className = "message-card";

    const top = document.createElement("div");
    top.className = "message-top";

    const author = document.createElement("span");
    author.className = "message-author";
    author.textContent = `${getDisplayName(data)}${adminSet.has(messageEmail) ? " 👑" : ""}`;

    const time = document.createElement("span");
    time.className = "message-time";
    time.textContent = formatChatTime(data.timestamp);

    if (isCurrentUserAdmin()) {
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "message-delete";
        deleteBtn.type = "button";
        deleteBtn.textContent = "Eliminar";
        deleteBtn.addEventListener("click", () => {
            deleteMessage(messageId);
        });
        top.append(deleteBtn);
    }

    top.append(author, time);

    const text = document.createElement("p");
    text.className = "message-text";
    text.textContent = sanitizeText(data.message);

    card.append(top, text);
    wrapper.append(avatar, card);
    return wrapper;
}

function renderMessages() {
    const shouldStick = isNearBottom();
    messages.innerHTML = "";

    if (cachedMessages.length === 0) {
        messages.innerHTML = '<div class="chat-empty">No hay mensajes todavía. Sé el primero en escribir.</div>';
        renderedMessages = 0;
        updatePresenceLabel();
        return;
    }

    for (const item of cachedMessages) {
        messages.appendChild(createMessageElement(item, item.id));
    }

    renderedMessages = cachedMessages.length;
    updatePresenceLabel();
    newMessagesBadge.classList.add("hidden");

    if (!didFirstRender || shouldStick) {
        scrollChatToBottom();
    }

    didFirstRender = true;
}

async function fetchMessages() {
    try {
        const payload = await apiRequest("/messages", { method: "GET" });
        const list = Array.isArray(payload.messages) ? payload.messages : [];
        cachedMessages = list;
        renderMessages();
    } catch (error) {
        messages.innerHTML = '<div class="chat-empty">No se pudieron cargar los mensajes. Revisa conexión del backend.</div>';
    }
}

async function deleteMessage(messageId) {
    if (!isCurrentUserAdmin()) {
        showMessage("Solo los admins pueden eliminar mensajes.", true);
        return;
    }

    try {
        await apiRequest(`/messages/${messageId}`, {
            method: "DELETE",
            headers: { "x-user-email": getCurrentUserEmail() }
        });
        await fetchMessages();
    } catch (error) {
        showMessage(error.message || "No se pudo eliminar el mensaje.", true);
    }
}

async function resetChatOnWebReload(user) {
    if (!user || didWebResetOnLoad) {
        return;
    }

    didWebResetOnLoad = true;
    try {
        await apiRequest("/messages/reset", {
            method: "POST",
            headers: { "x-user-email": (user.email || "").toLowerCase() },
            body: "{}"
        });
        await fetchMessages();
        showMessage("Chat reiniciado al recargar la web.");
    } catch (error) {
        showMessage("No se pudo reiniciar el chat en esta recarga.", true);
    }
}

async function sendMessage() {
    const user = auth.currentUser;
    const message = sanitizeText(msgInput.value);

    if (!user) {
        showMessage("Debes iniciar sesión antes de enviar mensajes.", true);
        return;
    }

    if (!message) {
        return;
    }

    try {
        const payload = await apiRequest("/messages", {
            method: "POST",
            body: JSON.stringify({
                name: getDisplayName(user),
                email: (user.email || "").toLowerCase(),
                message,
                photo: user.photoURL || "https://www.gravatar.com/avatar/?d=mp"
            })
        });

        if (payload.message?.id) {
            const exists = cachedMessages.some((item) => item.id === payload.message.id);
            if (!exists) {
                cachedMessages.push(payload.message);
                cachedMessages.sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
                renderMessages();
            }
        } else {
            await fetchMessages();
        }

        msgInput.value = "";
        msgInput.focus();
        showMessage("");
    } catch (error) {
        showMessage(error.message || "No se pudo enviar el mensaje.", true);
    }
}

async function loginWithGoogle() {
    try {
        showMessage("");
        await signInWithPopup(auth, googleProvider);
        showMessage("Sesión iniciada con Google.");
    } catch (error) {
        showMessage(formatError(error), true);
    }
}

async function loginWithEmail() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
        showMessage("Escribe tu correo y tu contraseña.", true);
        return;
    }

    try {
        showMessage("");
        await signInWithEmailAndPassword(auth, email, password);
        showMessage("Sesión iniciada correctamente.");
    } catch (error) {
        showMessage(formatError(error), true);
    }
}

async function registerWithEmail() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
        showMessage("Para crear la cuenta escribe correo y contraseña.", true);
        return;
    }

    try {
        showMessage("");
        const result = await createUserWithEmailAndPassword(auth, email, password);
        const nameFromEmail = email.split("@")[0];
        await updateProfile(result.user, { displayName: nameFromEmail });
        showMessage("Cuenta creada correctamente. Ya quedaste conectado.");
    } catch (error) {
        showMessage(formatError(error), true);
    }
}

async function logout() {
    try {
        await signOut(auth);
        showMessage("Sesión cerrada.");
    } catch (error) {
        showMessage(formatError(error), true);
    }
}

onAuthStateChanged(auth, async (user) => {
    updateSessionUI(user);
    await resetChatOnWebReload(user);
    renderMessages();
});

messages.innerHTML = '<div class="chat-empty">Cargando mensajes del chat...</div>';
fetchMessages();
setInterval(fetchMessages, 1500);

googleBtn.addEventListener("click", loginWithGoogle);
loginBtn.addEventListener("click", loginWithEmail);
registerBtn.addEventListener("click", registerWithEmail);
logoutBtn.addEventListener("click", logout);
sendBtn.addEventListener("click", sendMessage);

msgInput.addEventListener("keypress", (event) => {
    if (event.key === "Enter") {
        sendMessage();
    }
});

messages.addEventListener("scroll", () => {
    if (isNearBottom()) {
        newMessagesBadge.classList.add("hidden");
    }
});

newMessagesBadge.addEventListener("click", scrollChatToBottom);

if (playerFrame) {
    playerFrame.addEventListener("focus", () => {
        triggerHeaderGlow();
    });

    playerFrame.addEventListener("load", () => {
        window.addEventListener("message", (event) => {
            const origin = String(event.origin || "");
            if (!origin.includes("zeno.fm")) {
                return;
            }

            if (looksLikePlayEvent(event.data)) {
                triggerHeaderGlow();
            }
        });
    }, { once: true });
}
</script>

<script>
(() => {
    function isBlockedShortcut(event) {
        const key = String(event.key || "").toLowerCase();
        const ctrlOrMeta = event.ctrlKey || event.metaKey;
        const shift = event.shiftKey;

        if (key === "f12") {
            return true;
        }

        if (ctrlOrMeta && key === "u") {
            return true;
        }

        if (ctrlOrMeta && shift && (key === "i" || key === "j" || key === "c")) {
            return true;
        }

        return false;
    }

    document.addEventListener("keydown", (event) => {
        if (isBlockedShortcut(event)) {
            event.preventDefault();
            event.stopPropagation();
        }
    }, true);

    document.addEventListener("contextmenu", (event) => {
        event.preventDefault();
    });
})();
</script>
